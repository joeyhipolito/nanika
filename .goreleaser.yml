version: 2

# Nanika skill CLIs — one build entry per skill module.
# Skipped: claude-sdk-go (library), decomposer (knowledge-only), publishing-shared (library).

builds:
  - id: orchestrator
    dir: skills/orchestrator
    main: .
    binary: orchestrator
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: default
    # One tar.gz per binary per platform: <binary>_<os>_<arch>.tar.gz
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt
  algorithm: sha256
